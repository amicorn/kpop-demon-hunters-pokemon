<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Birthday Battle</title>

  <!-- Retro font -->
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="styles/styles.css">
</head>
<body>
  <div class="game">

    <!-- Background -->
    <div class="bg"></div>

    <!-- Opponent sprite (slides in from left -> middle-right) -->
    <div class="sprite sprite-opponent" id="opponent">
      <img src="assets/Derpy_Tiger_Sprite_Resized_Pink.png" alt="Derpy Tiger" class="sprite-art tiger" />
    </div>

    <!-- Player sprite (slides in from right -> bottom-left) -->
    <div class="sprite sprite-player" id="player">
      <img src="assets/Huntrix_Resized.png" alt="RUMI / Huntrix" class="sprite-art player" />
    </div>

    <!-- Opponent stats bubble (hidden until JS reveals) -->
    <div class="stats stats-opponent" id="opponentStats" aria-hidden="true">
      <div class="stats-row">
        <span class="stats-name">DERPY TIGER</span>
        <span class="stats-level">Lv 7</span>
      </div>
      <div class="hp"><div class="hp-fill" style="width:92%"></div></div>
    </div>

    <!-- Player stats bubble (hidden until Meet pressed) -->
    <div class="stats stats-player" id="playerStats" aria-hidden="true">
      <div class="stats-row">
        <span class="stats-name">RUMI</span>
        <span class="stats-level">Lv.98</span>
      </div>
      <div class="hp"><div class="hp-fill" style="width:100%"></div></div>
    </div>

    <!-- Bottom text panel -->
    <div class="panel" id="panel">
      <div class="panel-frame">
        <div class="panel-inner">
          <div class="panel-left">
            <p id="promptText" aria-live="polite"></p>
          </div>
          <div class="panel-right" id="buttons" role="region"></div>
        </div>
      </div>
    </div>

    <!-- Hearts effect container -->
    <div class="hearts" id="hearts" aria-hidden="true"></div>

    <!-- Card popup (hidden initially) -->
    <div class="card-popup card-popup-hidden" id="cardPopup" role="dialog" aria-modal="true" aria-hidden="true">
      <div class="card-popup-wrapper">
        <div class="card-popup-content" id="cardPopupContent">
          <div class="card-popup-text">🎉 Surprise! DERPY has a secret message for you! 🎉</div>
          <button class="card-popup-btn" id="openCardPopupBtn">OPEN CARD</button>
        </div>

        <img id="cardPopupImage" class="card-popup-img"
             src="assets/Derpy_Tiger_card_resized.png"
             alt="Derpy Tiger Card">
      </div>
    </div>

  </div>

  <!-- helper functions -->
  <script src="renderer.js"></script>
  <!-- main game flow -->
  <script src="script.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>KPop Demon Hunters Pokemon Dance Battle</title>

    <!-- Retro font -->
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Inter:wght@300;400;600&display=swap"
        rel="stylesheet">

    <link rel="stylesheet" href="styles/styles.css">
</head>

<body>
    <div class="game">

        <!-- Background -->
        <div class="bg"></div>

        <!-- Opponent sprite (slides in from left -> middle-right) -->
        <div id="opponentWrapper">
            <div class="sprite sprite-opponent" id="opponent">
                <img src="assets/images/Derpy_Tiger_Sprite_Resized_Pink.png" alt="Derpy Tiger" class="sprite-art tiger" />
            </div>
        </div>

        <!-- Player sprite (slides in from right -> bottom-left) -->
        <div id="playerWrapper">
            <div class="sprite sprite-player" id="player">
                <img src="assets/images/Huntrix_Resized.png" alt="RUMI / Huntrix" class="sprite-art player" />
            </div>
        </div>

        <!-- Opponent stats bubble -->
        <div class="stats stats-opponent" id="opponentStats" aria-hidden="false">
            <div class="stats-row">
                <div class="stats-left">
                    <span class="stats-name">DERPY TIGER</span>
                    <img src="assets/images/Saja_Boys_Logo_Resized.png" alt="Logo" class="stats-logo" />
                </div>
                <span class="stats-level">Lv.7</span>
            </div>
            <div class="hp">
                <span class="hp-label">HP</span>
                <div class="hp-bar">
                    <div class="hp-fill-saja" style="width:75%"></div>
                </div>
            </div>
        </div>

        <!-- Player stats bubble -->
        <div class="stats stats-player" id="playerStats" aria-hidden="false">
            <div class="stats-row">
                <div class="stats-left">
                    <span class="stats-name">HUNTRIX</span>
                    <img src="assets/images/Huntrix_Logo_Resized.png" alt="Logo" class="stats-logo" />
                </div>
                <span class="stats-level">Lv.98</span>
            </div>
            <div class="hp">
                <span class="hp-label">HP</span>
                <div class="hp-bar">
                    <div class="hp-fill-huntrix" style="width:90%"></div>
                </div>
            </div>
        </div>


        <!-- Bottom text panel -->
        <div class="panel" id="panel">
            <div class="panel-frame">
                <div class="panel-inner">
                    <div class="panel-left">
                        <p id="promptText" aria-live="polite"></p>
                    </div>
                    <div class="panel-right" id="buttons" role="region"></div>
                </div>
            </div>
        </div>

        <!-- Hearts effect container -->
        <div class="hearts" id="hearts" aria-hidden="true"></div>

        <!-- Card popup (hidden initially) -->
        <div class="card-popup card-popup-hidden" id="cardPopup" role="dialog" aria-modal="true" aria-hidden="true">
            <div class="card-popup-wrapper">
                <div class="card-popup-content" id="cardPopupContent">
                    <div class="card-popup-text">🎉 Surprise! DERPY has a secret message for you! 🎉</div>
                    <button class="open-card-btn" id="openCardPopupBtn">OPEN CARD</button>
                    <button class="derpy-close-btn" id="returnToJinuBtn">RETURN TO JINU</button>
                </div>

                <img id="cardPopupImage" class="card-popup-img" src="assets/images/Derpy_Tiger_Card_Resized.png"
                    alt="Derpy Tiger Card">

            </div>
        </div>

        <!-- Birthday card popup -->
        <div class="birthday-card-popup birthday-card-hidden" id="birthdayCardPopup" role="dialog" aria-modal="true"
            aria-hidden="true">
            <div id="birthdayCardContainer" class="birthday-card-wrapper">
                <img id="birthdayCardImage" class="birthday-card-img" src="" alt="Birthday Card">
                <div class="birthday-card-text" id="birthdayCardText"></div>
                <button class="birthday-close-btn" id="closeBirthdayCardBtn">CLOSE</button>
            </div>
        </div>




    </div>

    <!-- helper functions -->
    <script src="renderer.js"></script>
    <!-- main game flow -->
    <script src="script.js"></script>
</body>

</html>
